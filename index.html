<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LIFF Workout Share</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <section class="status-panel" id="status-panel" aria-live="polite"></section>

      <nav class="tab-nav" id="tab-nav" aria-label="メインタブ">
        <button class="tab-button is-active" data-tab="input" type="button">入力</button>
        <button class="tab-button" data-tab="preview" type="button">プレビュー</button>
        <button class="tab-button" data-tab="history" type="button">履歴</button>
        <button class="tab-button" id="tab-button-ranking" data-tab="ranking" type="button" hidden>
          ランキング
        </button>
      </nav>

      <main class="tab-panels">
        <section class="tab-panel is-active" id="tab-input"></section>
        <section class="tab-panel" id="tab-preview" hidden></section>
        <section class="tab-panel" id="tab-history" hidden></section>
        <section class="tab-panel" id="tab-ranking" hidden></section>
      </main>
    </div>

    <div class="action-bar" id="action-bar">
      <button class="action-button ghost" id="add-exercise-button" type="button">種目追加</button>
      <button class="action-button ghost" id="preview-button" type="button">プレビュー</button>
      <button class="action-button secondary" id="copy-json-button" type="button" hidden>
        Flex JSONコピー
      </button>
      <button class="action-button primary" id="share-button" type="button">LINEで共有</button>
    </div>
  </body>
</html>
